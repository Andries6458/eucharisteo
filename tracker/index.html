<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Eucharisteo Trading — private invoice tracker for Vulcan Mozambique and AMSA Vanderbijlpark.">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="robots" content="noindex,nofollow">
  <title>Eucharisteo · Invoice Tracker</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" href="assets/icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

  <!-- ============ LOGIN ============ -->
  <div id="login" class="login-screen">
    <div class="login-card">
      <img src="assets/icons/icon-192.png" alt="Eucharisteo">
      <h1>Invoice Tracker</h1>
      <p class="sub">Eucharisteo Trading (Pty) Ltd</p>
      <div id="login-error" class="error-msg"></div>
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" placeholder="you@eucharisteotrading.co.za" required>
        </div>
        <div class="field" id="pw-field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%" type="submit" id="login-btn">Sign in</button>
      </form>
      <div class="login-note" id="login-note"></div>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="brand">
        <img src="assets/icons/icon-192.png" alt="">
        <div class="brand-text">
          <b>Eucharisteo</b>
          <small>Invoice Tracker</small>
        </div>
      </div>
      <div class="topbar-spacer"></div>
      <span id="mode-badge" class="mode-badge mode-local">Local</span>
      <button id="bell" class="iconbtn" title="Reminders & notifications" aria-label="Reminders">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <span id="bell-count" class="dot hidden">0</span>
      </button>
      <div class="userchip">
        <span class="email" id="user-email"></span>
        <button id="signout" class="btn btn-sm btn-ghost">Sign out</button>
      </div>
    </header>

    <main class="wrap">
      <div class="eyebrow">Dashboard</div>
      <h2 class="section-title">Receivables &amp; Payables</h2>

      <div id="summary" class="summary-grid"></div>

      <div class="reminders" id="reminders-panel">
        <div class="head">
          <h3 class="section-title" style="font-size:1.25rem;margin:0">Reminders</h3>
          <button id="notify-toggle" class="btn btn-sm">Enable device alerts</button>
        </div>
        <div id="reminders-list"></div>
      </div>

      <div class="toolbar">
        <div class="tabs" id="party-tabs">
          <button class="tab active" data-party="ALL">All</button>
          <button class="tab" data-party="VULCAN">Vulcan</button>
          <button class="tab" data-party="AMSA">AMSA</button>
        </div>
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" type="search" placeholder="Search invoice no, CT number, notes…">
        </div>
        <button class="btn" id="btn-paste" title="Paste invoices from Excel / Windows">⎘ Paste</button>
        <button class="btn" id="btn-excel">⬇ Excel</button>
        <button class="btn" id="btn-pdf">⬇ PDF</button>
        <button class="btn btn-ghost btn-sm" id="btn-menu" title="Backup, settings">⋯</button>
      </div>

      <div class="table-wrap">
        <table class="inv">
          <thead>
            <tr>
              <th>Party</th><th>Invoice</th><th>CT Numbers</th><th>Issued</th><th>Due</th>
              <th>Status</th><th class="num">Total</th><th class="num">Paid</th><th class="num">Balance</th>
            </tr>
          </thead>
          <tbody id="inv-body"></tbody>
        </table>
      </div>
      <p id="empty-state" class="empty center" style="padding:2rem">No invoices yet. Tap <b>+</b> to add your first one.</p>
    </main>

    <button class="fab" id="fab" title="Add invoice" aria-label="Add invoice">+</button>
  </div>

  <div id="modal-host"></div>
  <div class="toast-host" id="toast-host"></div>

  <script type="module" src="assets/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
