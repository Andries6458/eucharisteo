<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Eucharisteo Trading monogram">
  <defs>
    <linearGradient id="gm-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c088"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#a6814f"/>
    </linearGradient>
    <linearGradient id="gm-gold-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c088"/>
      <stop offset="100%" stop-color="#c49862"/>
    </linearGradient>
  </defs>

  <!-- Golden globe -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#gm-gold)" stroke-width="1.6"/>

  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="44" ry="15" fill="none" stroke="url(#gm-gold)" stroke-width="0.9" opacity="0.85"/>
  <ellipse cx="50" cy="50" rx="44" ry="30" fill="none" stroke="url(#gm-gold)" stroke-width="0.9" opacity="0.55"/>

  <!-- Longitude lines -->
  <ellipse cx="50" cy="50" rx="15" ry="44" fill="none" stroke="url(#gm-gold)" stroke-width="0.9" opacity="0.85"/>
  <ellipse cx="50" cy="50" rx="30" ry="44" fill="none" stroke="url(#gm-gold)" stroke-width="0.9" opacity="0.55"/>

  <!-- Equator + Prime meridian -->
  <line x1="6" y1="50" x2="94" y2="50" stroke="url(#gm-gold)" stroke-width="1.2" opacity="0.95"/>
  <line x1="50" y1="6" x2="50" y2="94" stroke="url(#gm-gold)" stroke-width="1.2" opacity="0.95"/>

  <!-- Italic serif E -->
  <text x="50" y="77"
        font-family="Cormorant Garamond, Playfair Display, Georgia, serif"
        font-size="82"
        font-weight="500"
        font-style="italic"
        fill="url(#gm-gold-fill)"
        stroke="#0a0e1a"
        stroke-width="1.3"
        paint-order="stroke fill"
        text-anchor="middle"
        dominant-baseline="alphabetic">E</text>
</svg>
