# Builds an installable Android APK of the tracker — no PWABuilder needed.
# Run it from the Actions tab: "Build Invoice Tracker APK" -> Run workflow.
# When it finishes, open the run and download the "eucharisteo-invoice-tracker-apk"
# artifact (a .zip containing the .apk).
name: Build Invoice Tracker APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Point Bubblewrap at the JDK and Android SDK
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          { "jdkPath": "${JAVA_HOME}", "androidSdkPath": "${ANDROID_SDK_ROOT}" }
          EOF
          cat ~/.bubblewrap/config.json

      - name: Create signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias eucharisteo \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass eucharisteo123 -keypass eucharisteo123 \
            -dname "CN=Eucharisteo Trading, OU=IT, O=Eucharisteo Trading, L=Vanderbijlpark, ST=Gauteng, C=ZA"

      - name: Write Bubblewrap project manifest
        run: |
          cat > twa-manifest.json <<'EOF'
          {
            "packageId": "za.co.eucharisteotrading.tracker",
            "host": "tracker.eucharisteotrading.co.za",
            "name": "Eucharisteo Trading",
            "launcherName": "Eucharisteo Trading",
            "display": "standalone",
            "themeColor": "#0a0e1a",
            "themeColorDark": "#0a0e1a",
            "navigationColor": "#0a0e1a",
            "navigationColorDark": "#0a0e1a",
            "navigationDividerColor": "#0a0e1a",
            "navigationDividerColorDark": "#0a0e1a",
            "backgroundColor": "#0a0e1a",
            "enableNotifications": false,
            "startUrl": "/tracker/",
            "iconUrl": "https://tracker.eucharisteotrading.co.za/tracker/assets/icons/icon-512.png",
            "maskableIconUrl": "https://tracker.eucharisteotrading.co.za/tracker/assets/icons/icon-maskable-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "webManifestUrl": "https://tracker.eucharisteotrading.co.za/tracker/manifest.webmanifest",
            "fullScopeUrl": "https://tracker.eucharisteotrading.co.za/tracker/",
            "minSdkVersion": 21,
            "orientation": "default",
            "fallbackType": "customtabs",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "enableSiteSettingsShortcut": true,
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "features": {},
            "alphaDependencies": { "enabled": false },
            "signingKey": { "path": "./android.keystore", "alias": "eucharisteo" }
          }
          EOF
          cat twa-manifest.json

      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: eucharisteo123
          BUBBLEWRAP_KEY_PASSWORD: eucharisteo123
        run: |
          # Generate the Android project from twa-manifest.json, then build.
          bubblewrap update --skipVersionUpgrade || true
          bubblewrap build --skipPwaValidation
          echo "--- APK files produced ---"
          find . -iname "*.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eucharisteo-invoice-tracker-apk
          path: |
            *.apk
            app/build/outputs/**/*.apk
          if-no-files-found: error
