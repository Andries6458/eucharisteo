# =============================================================================
# Build an Android APK of the Eucharisteo Invoice Tracker (PWA -> TWA).
#
# This is OPTIONAL and runs only when you start it manually (Actions tab ->
# "Build Invoice Tracker APK" -> Run workflow). The easiest path is still
# PWABuilder.com (see tracker/README.md); this workflow automates the same
# thing with Bubblewrap and gives you the APK as a downloadable artifact.
#
# PREREQUISITES
#   1. Deploy the tracker somewhere on HTTPS so the manifest is reachable,
#      e.g. https://eucharisteotrading.co.za/tracker/  (GitHub Pages works).
#   2. Run this workflow and enter that base URL when prompted.
#
# SIGNING
#   For real, updatable releases create a keystore once and add these repo
#   secrets (Settings -> Secrets and variables -> Actions):
#       ANDROID_KEYSTORE_BASE64   (base64 of your .keystore file)
#       ANDROID_KEYSTORE_PASSWORD
#       ANDROID_KEY_ALIAS
#       ANDROID_KEY_PASSWORD
#   To create one locally:
#       keytool -genkey -v -keystore eucharisteo.keystore -alias eucharisteo \
#               -keyalg RSA -keysize 2048 -validity 10000
#       base64 -w0 eucharisteo.keystore   # paste output into the secret
#   Without these secrets the build uses a throwaway debug key (installs fine
#   for testing, but you cannot ship signed updates with it).
# =============================================================================
name: Build Invoice Tracker APK

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed tracker base URL (must end with /tracker/)"
        required: true
        default: "https://eucharisteotrading.co.za/tracker/"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialise TWA project
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
        run: |
          mkdir -p twa && cd twa
          # Bubblewrap reads the deployed manifest to scaffold the Android project
          bubblewrap init \
            --manifest "${BASE_URL%/}/manifest.webmanifest" \
            --directory . \
            --packageId co.za.eucharisteotrading.invoices \
            --skipPwaValidation || true

      - name: Restore signing keystore (if provided)
        id: keystore
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "$KS" | base64 -d > twa/android.keystore
            echo "have_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        working-directory: twa
        env:
          HAVE_KS: ${{ steps.keystore.outputs.have_keystore }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "$HAVE_KS" = "true" ]; then
            bubblewrap build \
              --skipPwaValidation \
              --signingKeyPath ./android.keystore \
              --signingKeyAlias "$KEY_ALIAS" || bubblewrap build --skipPwaValidation
          else
            # No release keystore -> produce the unsigned/debug build for testing
            bubblewrap build --skipPwaValidation || true
          fi
          ls -R . | grep -i ".apk" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eucharisteo-invoice-tracker-apk
          path: |
            twa/*.apk
            twa/app/build/outputs/**/*.apk
          if-no-files-found: warn
